<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP 诊断 & 地理位置检测</title>
  <style>
    /* 极致美学的深色简约UI，无外部CDN，纯原生CSS开发 */
    :root {
      --bg-color: #0b0f17;
      --card-bg: #161e2e;
      --card-border: rgba(255, 255, 255, 0.05);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.15);
      --emerald: #10b981;
      --rose: #ef4444;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* 头部排版 */
    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInDown 0.6s ease;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 400;
      max-width: 500px;
      margin: 0 auto;
    }

    /* 骨架屏加载状态 */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: var(--transition);
      animation: fadeInUp 0.5s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 130, 246, 0.25);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 0 15px var(--accent-glow);
    }

    /* 突出展示公网IP卡片 */
    .card-hero {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #131b2e 0%, #161e2e 100%);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 2rem;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .card-hero:hover {
      border-color: rgba(59, 130, 246, 0.5);
    }

    .hero-icon {
      background: rgba(59, 130, 246, 0.1);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .hero-ip {
      font-family: inherit;
      font-size: 2.5rem;
      font-weight: 800;
      word-break: break-all;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
    }

    .hero-subnet {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-weight: 600;
      cursor: default;
    }

    .type-v4 {
      background: rgba(16, 185, 129, 0.1);
      color: var(--emerald);
      border: 1px solid rgba(16, 185, 129, 0.15);
    }

    .type-v6 {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent);
      border: 1px solid rgba(59, 130, 246, 0.15);
    }

    /* 普通信息卡片 */
    .card-icon {
      background: rgba(255, 255, 255, 0.03);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .card:hover .card-icon {
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent);
    }

    .card-content {
      flex-grow: 1;
    }

    .card-label {
      font-size: 0.825rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
      font-weight: 500;
    }

    .card-value {
      font-size: 1.125rem;
      font-weight: 600;
      color: #ffffff;
      word-break: break-all;
    }

    /* 骨架屏加载动画特效 */
    .skeleton {
      background: linear-gradient(90deg, #161e2e 25%, #252f44 50%, #161e2e 75%);
      background-size: 200% 100%;
      animation: loading-pulse 1.5s infinite;
      border-radius: 8px;
    }

    .skeleton-text-lg {
      height: 2.25rem;
      width: 250px;
      margin: 0 auto 0.5rem auto;
    }

    .skeleton-text-sm {
      height: 1.25rem;
      width: 120px;
      margin: 0 auto;
    }

    .skeleton-value {
      height: 1.5rem;
      width: 80%;
    }

    /* 错误提示 */
    .error-container {
      display: none;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
      color: #fca5a5;
      animation: fadeIn 0.4s ease;
    }

    .error-icon {
      color: var(--rose);
      margin-bottom: 0.5rem;
    }

    .error-msg {
      font-weight: 600;
      font-size: 1.05rem;
    }

    .retry-btn {
      margin-top: 0.75rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ffffff;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
    }

    .retry-btn:hover {
      background: var(--rose);
    }

    /* 侧速大悬浮按钮 */
    .cta-container {
      text-align: center;
      margin: 1.5rem 0 2rem 0;
      animation: fadeInUp 0.7s ease;
    }

    .speedtest-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.15rem;
      padding: 1.1rem 2.5rem;
      border-radius: 50px;
      box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
      transition: var(--transition);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .speedtest-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 50px;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .speedtest-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.5), 0 0 20px rgba(59, 130, 246, 0.3);
    }

    .speedtest-btn:hover::before {
      opacity: 1;
    }

    .speedtest-btn:active {
      transform: translateY(-1px);
    }

    /* 页脚设计 */
    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      animation: fadeIn 0.8s ease;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      transition: var(--transition);
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* 动画定义 */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes loading-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* 移动端特殊自适应适配 */
    @media (max-width: 640px) {
      .container {
        padding: 1.5rem 1rem;
      }
      h1 {
        font-size: 1.75rem;
      }
      .hero-ip {
        font-size: 1.85rem;
      }
      .card-hero {
        padding: 1.5rem 1rem;
      }
      .skeleton-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .speedtest-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 id="title_banner">IP 核心网络诊断</h1>
      <p id="desc_banner">通过 Cloudflare 全球边缘网络，诊断您当前连接的最真实、无延迟公网网络信息</p>
    </header>

    <!-- 错误指示器 -->
    <div class="error-container" id="error-box">
      <div class="error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="error-msg" id="error-message">IP 信息获取失败：网络异常，或接口未响应</div>
      <button class="retry-btn" onclick="fetchIpData()">点此重新加载</button>
    </div>

    <!-- 骨架屏 + 真实卡片 -->
    <div class="skeleton-grid" id="info-grid">
      
      <!-- 公网IP主展示卡片 -->
      <div class="card card-hero" id="card-hero-element">
        <div class="hero-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        </div>
        <div class="hero-ip" id="ip-address"><div class="skeleton skeleton-text-lg"></div></div>
        <span class="hero-subnet" id="ip-type-badge" style="display: none;">IPv4</span>
        <div id="hero-loading" style="margin-top: 0.5rem;"><div class="skeleton skeleton-text-sm"></div></div>
      </div>

      <!-- 国家/城市卡片 -->
      <div class="card" id="card-geo">
        <div class="card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">地理位置 / 城市</div>
          <div class="card-value" id="geo-location"><div class="skeleton skeleton-value"></div></div>
        </div>
      </div>

      <!-- 运营商卡片 -->
      <div class="card" id="card-org">
        <div class="card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">运营商 / 网络所有者</div>
          <div class="card-value" id="org-value"><div class="skeleton skeleton-value"></div></div>
        </div>
      </div>

      <!-- ASN 路由卡片 -->
      <div class="card" id="card-asn">
        <div class="card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">自治系统 / ASN</div>
          <div class="card-value" id="asn-value"><div class="skeleton skeleton-value"></div></div>
        </div>
      </div>

      <!-- CF边缘节点卡片 -->
      <div class="card" id="card-colo">
        <div class="card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">Cloudflare 数据中心</div>
          <div class="card-value" id="colo-value"><div class="skeleton skeleton-value"></div></div>
        </div>
      </div>

      <!-- 经纬度位置卡片 -->
      <div class="card" id="card-coords">
        <div class="card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">地理坐标 (经度/纬度)</div>
          <div class="card-value" id="coords-value"><div class="skeleton skeleton-value"></div></div>
        </div>
      </div>

      <!-- 时区卡片 -->
      <div class="card" id="card-timezone">
        <div class="card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="card-content">
          <div class="card-label">所属时区 / TIMEZONE</div>
          <div class="card-value" id="timezone-value"><div class="skeleton skeleton-value"></div></div>
        </div>
      </div>

    </div>

    <!-- 底部跳转大按钮 -->
    <div class="cta-container">
      <a href="/speedtest/" class="speedtest-btn" id="speedtest-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><path d="m14 16-2-4 2-4"/><path d="m8 12h4"/></svg>
        开始网络测速 (LibreSpeed)
      </a>
    </div>
  </div>

  <footer>
    <p>部署平台: <a href="https://pages.cloudflare.com/" target="_blank" rel="noopener noreferrer">Cloudflare Pages</a> &bull; 边缘加速提供者: Cloudflare Inc.</p>
  </footer>

  <script>
    // 异步高能请求API接口
    async function fetchIpData() {
      const errorBox = document.getElementById("error-box");
      const infoGrid = document.getElementById("info-grid");
      const ipAddressEl = document.getElementById("ip-address");
      const ipTypeBadge = document.getElementById("ip-type-badge");
      const heroLoading = document.getElementById("hero-loading");
      
      const geoEl = document.getElementById("geo-location");
      const orgEl = document.getElementById("org-value");
      const asnEl = document.getElementById("asn-value");
      const coloEl = document.getElementById("colo-value");
      const coordsEl = document.getElementById("coords-value");
      const timezoneEl = document.getElementById("timezone-value");

      errorBox.style.display = "none";
      infoGrid.style.opacity = "1";

      // 预设骨架结构
      const setSkeleton = () => {
        ipAddressEl.innerHTML = '<div class="skeleton skeleton-text-lg"></div>';
        ipTypeBadge.style.display = "none";
        heroLoading.style.display = "block";
        heroLoading.innerHTML = '<div class="skeleton skeleton-text-sm"></div>';
        
        geoEl.innerHTML = '<div class="skeleton skeleton-value"></div>';
        orgEl.innerHTML = '<div class="skeleton skeleton-value"></div>';
        asnEl.innerHTML = '<div class="skeleton skeleton-value"></div>';
        coloEl.innerHTML = '<div class="skeleton skeleton-value"></div>';
        coordsEl.innerHTML = '<div class="skeleton skeleton-value"></div>';
        timezoneEl.innerHTML = '<div class="skeleton skeleton-value"></div>';
      };

      setSkeleton();

      try {
        // 请求 /api/ip 路由
        const response = await fetch("/api/ip");
        if (!response.ok) {
          throw new Error(`响应异常: ${response.status}`);
        }
        
        const data = await response.json();
        
        // 渲染数据
        ipAddressEl.textContent = data.ip;
        
        // 设置 IP 版本角标
        ipTypeBadge.textContent = data.ip_type;
        ipTypeBadge.className = "hero-subnet " + (data.ip_type === "IPv4" ? "type-v4" : "type-v6");
        ipTypeBadge.style.display = "inline-flex";
        
        heroLoading.style.display = "none";

        // 国家 + 省份 + 地区拼接展示
        let fullGeo = data.country_name;
        if (data.region && data.region !== "Unknown" && data.region !== "未知省份") {
          fullGeo += ` &bull; ${data.region}`;
        }
        if (data.city && data.city !== "Unknown" && data.city !== "未知城市") {
          fullGeo += ` &bull; ${data.city}`;
        }
        geoEl.innerHTML = fullGeo;

        orgEl.textContent = data.org || "未知";
        asnEl.textContent = data.asn || "未知";
        coloEl.textContent = `${data.colo} 节点`;

        if (data.latitude !== "未知" && data.longitude !== "未知") {
          coordsEl.textContent = `${Number(data.latitude).toFixed(4)}°N, ${Number(data.longitude).toFixed(4)}°E`;
        } else {
          coordsEl.textContent = "保密或无法匹配";
        }

        timezoneEl.textContent = data.timezone || "未知";
      } catch (err) {
        console.error("Fetch API error:", err);
        // 显示红色错误提示
        errorBox.style.display = "block";
        document.getElementById("error-message").innerHTML = `<strong>IP 诊断请求失败</strong>: ${err.message || '网络连接超时'}<br><small style="opacity: 0.8">如果您在本地预览，可能由于 Mock 拦截，部署至 Cloudflare 后功能将完全正常。</small>`;
        
        // 清理骨架，换成异常图标
        ipAddressEl.innerHTML = '<span style="color:#ef4444;font-size:1.5rem">获取失败</span>';
        heroLoading.style.display = "none";
        [geoEl, orgEl, asnEl, coloEl, coordsEl, timezoneEl].forEach(el => {
          el.innerHTML = '<span style="color:#ef4444;opacity:0.8;font-size:0.9rem">查询失败</span>';
        });
      }
    }

    // 页面运行自动异步获取
    window.addEventListener("DOMContentLoaded", fetchIpData);
  </script>
</body>
</html>

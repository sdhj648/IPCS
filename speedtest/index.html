<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LibreSpeed 极速网络测速</title>
  <style>
    :root {
      --bg-color: #0b0f17;
      --card-bg: #161e2e;
      --card-border: rgba(255, 255, 255, 0.05);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.2);
      --download-color: #00f0ff;
      --upload-color: #f43f5e;
      --ping-color: #10b981;
      --jitter-color: #8b5cf6;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1.25rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00f0ff 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: var(--transition);
      background: rgba(255, 255, 255, 0.03);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--card-border);
    }

    .back-home:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* 测试仪表盘布局 */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    /* 测速主显示盘 */
    .gauge-card {
      grid-column: 1 / -1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 2.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .gauge-wrapper {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* SVG 弧度进度条设计 */
    .gauge-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .gauge-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.04);
      stroke-width: 12;
    }

    .gauge-fill {
      fill: none;
      stroke: url(#gauge-gradient);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 628;  /* 2 * PI * 100 = 628 */
      stroke-dashoffset: 628; /* start empty */
      transition: stroke-dashoffset 0.1s linear;
    }

    .gauge-text-box {
      position: absolute;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gauge-speed {
      font-size: 3.5rem;
      font-weight: 850;
      color: #ffffff;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .gauge-unit {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 1.5rem;
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* 分类指标详情格 */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      width: 100%;
      margin-top: 2rem;
    }

    .metric-box {
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 1.25rem 0.75rem;
      text-align: center;
      transition: var(--transition);
    }

    .metric-box.active-d {
      border-color: rgba(0, 240, 255, 0.25);
      background: rgba(0, 240, 255, 0.02);
    }

    .metric-box.active-u {
      border-color: rgba(244, 63, 94, 0.25);
      background: rgba(244, 63, 94, 0.02);
    }

    .metric-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .metric-value {
      font-size: 1.75rem;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
    }

    .metric-unit {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-left: 0.1rem;
    }

    /* 上下面颜色区别标记 */
    #val-download { color: var(--download-color); }
    #val-upload { color: var(--upload-color); }
    #val-ping { color: var(--ping-color); }
    #val-jitter { color: var(--jitter-color); }

    /* 控制控制启动大圆形按钮 */
    .trigger-container {
      text-align: center;
      margin-top: 2rem;
    }

    .ctrl-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: #ffffff;
      border: none;
      font-size: 1.2rem;
      font-weight: 750;
      padding: 1.1rem 3.5rem;
      border-radius: 50vw;
      cursor: pointer;
      box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }

    .ctrl-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.3);
    }

    .ctrl-btn:active:not(:disabled) {
      transform: translateY(-1px);
    }

    .ctrl-btn:disabled {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* 进度状态提示图 */
    .progress-bar-container {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.03);
      position: absolute;
      bottom: 0;
      left: 0;
      overflow: hidden;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width 0.1s linear;
    }

    /* IP检测小悬浮面板 */
    .ip-box {
      margin-top: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .ip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ping-color);
    }

    .ip-text {
      color: #ffffff;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* 自适应高度适配与布局调整 */
    @media (max-width: 768px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }
      .gauge-wrapper {
        width: 200px;
        height: 200px;
      }
      .gauge-speed {
        font-size: 2.8rem;
      }
      .ctrl-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>LibreSpeed 极速网络测速</h1>
      <a href="/" class="back-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        网路信息诊断
      </a>
    </header>

    <div class="dashboard-grid">
      <div class="gauge-card">
        <!-- 动态 SVG 极速圆盘 -->
        <div class="gauge-wrapper">
          <svg class="gauge-svg" viewBox="0 0 220 220">
            <defs>
              <linearGradient id="gauge-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f0ff" id="gauge-grad-start" />
                <stop offset="100%" stop-color="#3b82f6" id="gauge-grad-end" />
              </linearGradient>
            </defs>
            <!-- Background circle (representing 100% capacity) -->
            <!-- 2 * PI * R where R=100. Perimeter = 628.3 -->
            <circle class="gauge-bg" cx="110" cy="110" r="100"></circle>
            <!-- Variable Gauge Fill -->
            <circle class="gauge-fill" id="gauge-ring" cx="110" cy="110" r="100"></circle>
          </svg>
          <div class="gauge-text-box">
            <div class="gauge-speed" id="speed-meter">0.0</div>
            <div class="gauge-unit" id="speed-unit">Mbps</div>
          </div>
        </div>

        <div class="status-text" id="status-desc">待测速</div>

        <!-- 详细分类格子 -->
        <div class="metrics-grid">
          
          <div class="metric-box" id="box-download">
            <div class="metric-label">下载速率 (Download)</div>
            <div class="metric-value">
              <span id="val-download">0.00</span>
              <span class="metric-unit">Mbps</span>
            </div>
          </div>

          <div class="metric-box" id="box-upload">
            <div class="metric-label">上传速率 (Upload)</div>
            <div class="metric-value">
              <span id="val-upload">0.00</span>
              <span class="metric-unit">Mbps</span>
            </div>
          </div>

          <div class="metric-box" id="box-ping">
            <div class="metric-label">网络往返 (Ping)</div>
            <div class="metric-value">
              <span id="val-ping">-</span>
              <span class="metric-unit">ms</span>
            </div>
          </div>

          <div class="metric-box" id="box-jitter">
            <div class="metric-label">网络抖动 (Jitter)</div>
            <div class="metric-value">
              <span id="val-jitter">-</span>
              <span class="metric-unit">ms</span>
            </div>
          </div>

        </div>

        <!-- 底面缓存安全指示进度条 -->
        <div class="progress-bar-container">
          <div class="progress-bar" id="status-progress"></div>
        </div>
      </div>
    </div>

    <!-- 用户专属面板 -->
    <div style="text-align: center;">
      <div class="ip-box">
        <span class="ip-dot"></span>
        <span>连接节点: </span>
        <span class="ip-text" id="node-ip">正在接入 IP 节点...</span>
      </div>
    </div>

    <div class="trigger-container">
      <button class="ctrl-btn" id="btn-action" onclick="runSpeedtest()">
        <!-- SVG Play Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        一键全面测速
      </button>
    </div>
  </div>

  <footer>
    <p>协议核心: LibreSpeed HTML5 &bull; <a href="/">退出测速</a></p>
  </footer>

  <script>
    // 定义仪表盘极值 (100Mbps 算代表性高标准，以此推算出圆环百分比进度)
    const MAX_VAL_FOR_GUAGE = 150; 
    const GAUGE_PERIMETER = 628;

    // 获取并更新当前 IP
    async function loadNodeIP() {
      try {
        const res = await fetch("/api/ip");
        if (res.ok) {
          const data = await res.json();
          document.getElementById("node-ip").textContent = `${data.ip} (${data.country_name} ${data.city})`;
        } else {
          document.getElementById("node-ip").textContent = "无法获取当前IP";
        }
      } catch (e) {
        document.getElementById("node-ip").textContent = "网络接口暂无法查询";
      }
    }

    window.addEventListener("DOMContentLoaded", loadNodeIP);

    // 辅助：设置圆环填充比例
    function setGaugeProgress(val, max = MAX_VAL_FOR_GUAGE) {
      const ring = document.getElementById("gauge-ring");
      const percentage = Math.min(Math.max(val / max, 0), 1);
      // 0 = 满, 628 = 空 (因此 stroke-dashoffset = Perimeter * (1 - Percentage))
      const offset = GAUGE_PERIMETER * (1 - percentage);
      ring.style.strokeDashoffset = offset;
    }

    // 全面测速多任务引擎
    async function runSpeedtest() {
      const btn = document.getElementById("btn-action");
      btn.disabled = true;

      const statusDesc = document.getElementById("status-desc");
      const speedMeter = document.getElementById("speed-meter");
      const speedUnit = document.getElementById("speed-unit");
      const progressBar = document.getElementById("status-progress");
      
      const valDownload = document.getElementById("val-download");
      const valUpload = document.getElementById("val-upload");
      const valPing = document.getElementById("val-ping");
      const valJitter = document.getElementById("val-jitter");

      const boxDownload = document.getElementById("box-download");
      const boxUpload = document.getElementById("box-upload");

      // 1. 初始化仪表恢复
      progressBar.style.width = "0%";
      setGaugeProgress(0);
      speedMeter.textContent = "0.0";
      valDownload.textContent = "0.00";
      valUpload.textContent = "0.00";
      valPing.textContent = "-";
      valJitter.textContent = "-";
      boxDownload.classList.remove("active-d");
      boxUpload.classList.remove("active-u");

      // ----------------- PHASE 1: PING & JITTER -----------------
      statusDesc.textContent = "正在计算网络时延 (Ping & Jitter)...";
      progressBar.style.width = "15%";

      const pingCount = 10;
      const pings = [];
      
      for (let i = 0; i < pingCount; i++) {
        const start = performance.now();
        try {
          // 请求 `/api/empty`
          await fetch("/api/empty?r=" + Math.random(), { method: "GET" });
          const latency = performance.now() - start;
          pings.push(latency);
          valPing.textContent = Math.round(latency);
        } catch (e) {
          console.error("Ping measurement error:", e);
        }
        // 休眠小段时间以使数据保持自然
        await new Promise(resolve => setTimeout(resolve, 100));
      }

      if (pings.length === 0) {
        valPing.textContent = "超时";
        valJitter.textContent = "无法估算";
      } else {
        // 计算平均 Ping
        const avgPing = pings.reduce((a, b) => a + b, 0) / pings.length;
        valPing.textContent = avgPing.toFixed(1);

        // 计算 Jitter
        let totalDiff = 0;
        for (let i = 1; i < pings.length; i++) {
          totalDiff += Math.abs(pings[i] - pings[i - 1]);
        }
        const jitter = totalDiff / (pings.length - 1);
        valJitter.textContent = jitter.toFixed(1);
      }

      // ----------------- PHASE 2: DOWNLOAD SPEED -----------------
      statusDesc.textContent = "正在下载测速 (Download Testing)...";
      boxDownload.classList.add("active-d");
      progressBar.style.width = "50%";

      const downloadDuration = 7000; // 下载测速测试持续7秒
      const startTime = Date.now();
      let totalBytesRead = 0;
      let isDownloadFinished = false;

      // 渐变圆盘主题颜色设为 Cyan/Blue 
      document.getElementById("gauge-grad-start").setAttribute("stop-color", "#00f0ff");
      document.getElementById("gauge-grad-end").setAttribute("stop-color", "#3b82f6");

      // 启动 4 条并发下载流以极限充斥用户带宽
      const numThreads = 4;
      const downloadTasks = Array.from({ length: numThreads }).map(async () => {
        while (!isDownloadFinished && (Date.now() - startTime) < downloadDuration) {
          try {
            // chunk size 设为 15MB 强制边缘流
            const res = await fetch(`/api/garbage?ckSize=15&r=${Math.random()}`);
            if (!res.ok) continue;
            
            const reader = res.body.getReader();
            while (!isDownloadFinished) {
              const { done, value } = await reader.read();
              if (done) break;
              if (value) {
                totalBytesRead += value.length;
              }
            }
          } catch (e) {
            console.error("Download dynamic error:", e);
          }
        }
      });

      // 记录速率刷新时钟
      const speedTrackerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed <= 0) return;
        
        // 计算 Mbps
        const mbps = (totalBytesRead * 8) / (1024 * 1024) / elapsed;
        speedMeter.textContent = mbps.toFixed(1);
        valDownload.textContent = mbps.toFixed(2);
        setGaugeProgress(mbps);
      }, 200);

      // 等待限制时间到期
      await new Promise(resolve => setTimeout(resolve, downloadDuration));
      isDownloadFinished = true;
      await Promise.all(downloadTasks);
      clearInterval(speedTrackerInterval);

      // 锁定最终下载极速值
      const finalDownloadedElapsed = (Date.now() - startTime) / 1000;
      const finalDownloadMbps = (totalBytesRead * 8) / (1024 * 1024) / finalDownloadedElapsed;
      speedMeter.textContent = finalDownloadMbps.toFixed(1);
      valDownload.textContent = finalDownloadMbps.toFixed(2);
      setGaugeProgress(finalDownloadMbps);
      boxDownload.classList.remove("active-d");

      // ----------------- PHASE 3: UPLOAD SPEED -----------------
      statusDesc.textContent = "正在上传测速 (Upload Testing)...";
      boxUpload.classList.add("active-u");
      progressBar.style.width = "85%";

      // 装在高达 4MB 的纯粹缓冲区用于连续POST提交
      const testChunkSize = 4 * 1024 * 1024; // 4MB
      const randomDataGroup = new Uint8Array(testChunkSize);
      crypto.getRandomValues(randomDataGroup);
      const testBlob = new Blob([randomDataGroup], { type: "application/octet-stream" });

      const uploadDuration = 7000; // 上传持续7秒
      const uploadStartTime = Date.now();
      let totalBytesUploaded = 0;
      let isUploadFinished = false;

      // 改变渐变圆盘主题颜色为 Rose/Red 代表上传
      document.getElementById("gauge-grad-start").setAttribute("stop-color", "#f43f5e");
      document.getElementById("gauge-grad-end").setAttribute("stop-color", "#ec4899");

      // 启动并行 4 个上传通道
      const uploadThreads = 4;
      const uploadTasks = Array.from({ length: uploadThreads }).map(async () => {
        while (!isUploadFinished && (Date.now() - uploadStartTime) < uploadDuration) {
          try {
            await fetch(`/api/empty?r=${Math.random()}`, {
              method: "POST",
              headers: {
                "Content-Type": "application/octet-stream"
              },
              body: testBlob
            });
            if (!isUploadFinished) {
              totalBytesUploaded += testChunkSize;
            }
          } catch (e) {
            console.error("Upload stream upload error:", e);
          }
        }
      });

      const uploadTrackerInterval = setInterval(() => {
        const elapsed = (Date.now() - uploadStartTime) / 1000;
        if (elapsed <= 0) return;

        const uMbps = (totalBytesUploaded * 8) / (1024 * 1024) / elapsed;
        speedMeter.textContent = uMbps.toFixed(1);
        valUpload.textContent = uMbps.toFixed(2);
        setGaugeProgress(uMbps);
      }, 200);

      // 等待上传到期
      await new Promise(resolve => setTimeout(resolve, uploadDuration));
      isUploadFinished = true;
      await Promise.all(uploadTasks);
      clearInterval(uploadTrackerInterval);

      // 锁定最终上传极速值
      const finalUploadElapsed = (Date.now() - uploadStartTime) / 1000;
      const finalUploadMbps = (totalBytesUploaded * 8) / (1024 * 1024) / finalUploadElapsed;
      speedMeter.textContent = finalUploadMbps.toFixed(1);
      valUpload.textContent = finalUploadMbps.toFixed(2);
      setGaugeProgress(finalUploadMbps);
      boxUpload.classList.remove("active-u");

      // ----------------- COMPLETE -----------------
      statusDesc.textContent = "网络诊断及测速全部完成！";
      progressBar.style.width = "100%";
      setGaugeProgress(finalDownloadMbps); // 回复到最高下载速圆环
      speedMeter.textContent = finalDownloadMbps.toFixed(1);
      
      btn.disabled = false;
    }
  </script>
</body>
</html>
